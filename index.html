<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stardew Master: Legacy Edition</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 100; pointer-events: none; }
        .box { background: rgba(0,0,0,0.85); border: 2px solid #f1c40f; padding: 10px; color: white; border-radius: 8px; margin-bottom: 5px; width: 220px; }
        #dialogue { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; background: #3d2516; border: 4px solid #8b4513; padding: 20px; color: #f5deb3; display: none; z-index: 1000; border-radius: 10px; }
        #inventory { position: absolute; bottom: 10px; right: 10px; display: flex; gap: 5px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
        .slot { width: 45px; height: 45px; border: 2px solid #777; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; }
        .active { border-color: #f1c40f; background: rgba(241, 196, 15, 0.3); }
        #msg-popup { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #2ecc71; font-size: 40px; display: none; font-weight: bold; text-shadow: 2px 2px #000; z-index: 2000; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="box">
            <div style="color: #f1c40f; font-weight: bold;">GOLD: <span id="gold">500</span></div>
            <div>ENERGY: <span id="energy">100</span>/100</div>
            <div style="color: #3498db;">DAY: <span id="day">1</span></div>
        </div>
        <div id="quest-box" class="box">Quest: <span id="quest">Watch the Bus...</span></div>
        <div id="save-prompt" class="box" style="display:none; border-color: #2ecc71;">Press 'S' to Sleep & Save</div>
    </div>

    <div id="msg-popup">Zzz... SAVED</div>

    <div id="dialogue">
        <div id="speaker" style="color: #f1c40f; font-weight: bold; font-size: 20px;"></div>
        <div id="msg" style="font-size: 18px;"></div>
    </div>

    <div id="inventory">
        <div class="slot active" id="s1">1<br>Hoe</div>
        <div class="slot" id="s2">2<br>Seed</div>
        <div class="slot" id="s3">3<br>Sword</div>
    </div>

    <script>
    const config = {
        type: Phaser.AUTO,
        width: window.innerWidth, height: window.innerHeight,
        pixelArt: true,
        physics: { default: 'arcade' },
        scene: { preload, create, update }
    };

    const game = new Phaser.Game(config);
    let player, cursors, enemies, house, bus, isCutscene = true;
    let gold = parseInt(localStorage.getItem('stardew_gold')) || 500;
    let day = parseInt(localStorage.getItem('stardew_day')) || 1;
    let questStep = parseInt(localStorage.getItem('stardew_quest')) || 0;
    let energy = 100, selectedTool = 1;

    function preload() {
        this.load.spritesheet('hero', 'https://phaser.io', { frameWidth: 16, frameHeight: 18 });
        this.load.image('bus', 'https://phaser.io');
        this.load.image('ground', 'https://phaser.io');
    }

    function create() {
        // 1. WORLD SETUP
        this.add.tileSprite(1000, 1000, 2000, 2000, 'ground').setAlpha(0.2);
        this.physics.world.setBounds(0, 0, 2000, 2000);

        // 2. BUILDINGS
        house = this.add.rectangle(400, 300, 100, 100, 0x2980b9).setStrokeStyle(4, 0xffffff);
        this.add.text(375, 240, "MY HOUSE", {color: '#fff'});
        this.physics.world.enable(house);

        this.cc = this.add.rectangle(1600, 300, 200, 150, 0x95a5a6).setStrokeStyle(4, 0x7f8c8d);
        this.add.text(1520, 280, "COMMUNITY CENTER", {color: '#fff'});

        // 3. INTRO BUS
        bus = this.add.sprite(-200, 450, 'bus').setScale(5).setTint(0x3498db);

        // 4. PLAYER & ENEMIES
        player = this.physics.add.sprite(400, 450, 'hero').setScale(3).setAlpha(0);
        this.cameras.main.startFollow(player, true, 0.1, 0.1);
        
        enemies = this.physics.add.group();
        for(let i=0; i<6; i++) { spawnSlime(this); }

        // 5. ANIMATIONS
        this.anims.create({
            key: 'walk',
            frames: this.anims.generateFrameNumbers('hero', { start: 0, end: 1 }),
            frameRate: 6,
            repeat: -1
        });

        // 6. COLLISIONS
        this.physics.add.overlap(player, enemies, (p, e) => {
            energy -= 0.2; updateUI();
            if(energy <= 0) passOut();
        });

        // 7. INPUTS
        cursors = this.input.keyboard.createCursorKeys();
        this.input.keyboard.on('keydown', e => {
            if(["1","2","3"].includes(e.key)) { selectedTool = parseInt(e.key); updateUI(); }
        });

        this.input.on('pointerdown', (p) => {
            if(isCutscene || energy <= 5) return;
            const gx = Math.floor(p.worldX/40)*40; const gy = Math.floor(p.worldY/40)*40;
            useTool(this, gx, gy);
        });

        if(questStep === 0) runIntro(this);
        else { isCutscene = false; player.setAlpha(1); updateUI(); }
    }

    async function runIntro(scene) {
        scene.tweens.add({
            targets: bus, x: 400, duration: 3000,
            onComplete: () => {
                say("Driver", "Welcome! Press '1-3' to swap tools. Walk to your house to save.");
                setTimeout(() => {
                    player.setAlpha(1);
                    scene.tweens.add({ targets: bus, x: 1200, duration: 2000 });
                    hideSay(); isCutscene = false; questStep = 1; updateUI();
                }, 3000);
            }
        });
    }

    function useTool(scene, x, y) {
        energy -= 2;
        if(selectedTool === 1) scene.add.rectangle(x+20, y+20, 38, 38, 0x7e5109); // Hoe
        if(selectedTool === 2 && gold >= 10) { // Plant
            gold -= 10;
            let c = scene.add.circle(x+20, y+20, 6, 0x2ecc71);
            scene.time.delayedCall(5000, () => { c.setRadius(14).setFillStyle(0xf1c40f); gold += 30; updateUI(); });
        }
        if(selectedTool === 3) { // Sword
            let swing = scene.add.circle(player.x, player.y, 60, 0xffffff, 0.3);
            enemies.getChildren().forEach(e => {
                if(Phaser.Math.Distance.Between(player.x, player.y, e.x, e.y) < 70) {
                    e.destroy(); spawnSlime(scene); gold += 20;
                }
            });
            scene.time.delayedCall(100, () => swing.destroy());
        }
        updateUI();
    }

    function spawnSlime(scene) {
        let s = enemies.create(Phaser.Math.Between(100,1900), Phaser.Math.Between(100,1900), 'hero');
        s.setTint(0x2ecc71).setScale(2);
        s.body.setVelocity(Phaser.Math.Between(-80, 80), Phaser.Math.Between(-80, 80)).setBounce(1).setCollideWorldBounds(true);
    }

    function passOut() {
        gold = Math.max(0, gold - 50);
        player.setPosition(400, 450);
        energy = 50;
        say("System", "You collapsed from exhaustion! Lost 50G.");
        saveData();
    }

    function saveData() {
        localStorage.setItem('stardew_gold', gold);
        localStorage.setItem('stardew_day', day);
        localStorage.setItem('stardew_quest', questStep);
        const pop = document.getElementById('msg-popup');
        pop.style.display = 'block';
        setTimeout(() => pop.style.display = 'none', 2000);
    }

    function updateUI() {
        document.getElementById('gold').innerText = gold;
        document.getElementById('energy').innerText = Math.floor(energy);
        document.getElementById('day').innerText = day;
        document.getElementById('quest').innerText = questStep === 1 ? "Explore the Valley" : "Farmer Life";
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        document.getElementById('s'+selectedTool).classList.add('active');
    }

    function say(name, text) {
        const d = document.getElementById('dialogue'); d.style.display = 'block';
        document.getElementById('speaker').innerText = name; document.getElementById('msg').innerText = text;
    }

    function hideSay() { document.getElementById('dialogue').style.display = 'none'; }

    function update() {
        if(isCutscene) return;
        player.setVelocity(0);
        if (cursors.left.isDown) { player.setVelocityX(-200); player.setFlipX(true); player.play('walk', true); }
        else if (cursors.right.isDown) { player.setVelocityX(200); player.setFlipX(false); player.play('walk', true); }
        else if (cursors.up.isDown) { player.setVelocityY(-200); player.play('walk', true); }
        else if (cursors.down.isDown) { player.setVelocityY(200); player.play('walk', true); }
        else { player.stop(); }

        // Home Check
        let dist = Phaser.Math.Distance.Between(player.x, player.y, house.x, house.y);
        const prompt = document.getElementById('save-prompt');
        if(dist < 80) {
            prompt.style.display = 'block';
            if(Phaser.Input.Keyboard.JustDown(this.input.keyboard.addKey('S'))) {
                day++; energy = 100; saveData(); updateUI();
            }
        } else { prompt.style.display = 'none'; }
    }
    </script>
</body>
</html>
