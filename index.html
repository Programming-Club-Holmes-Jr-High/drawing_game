<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stardew: Community Center Update</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #ui-layer { position: absolute; top: 10px; left: 10px; z-index: 100; pointer-events: none; }
        .quest-box { background: rgba(0,0,0,0.7); border: 2px solid #f1c40f; padding: 10px; color: white; border-radius: 5px; margin-bottom: 10px; width: 200px; }
        #dialogue-container { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 80%; background: rgba(45, 25, 10, 0.9); border: 4px solid #8b4513;
            padding: 20px; color: #f5deb3; display: none; z-index: 1000; border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div class="quest-box">
            <strong style="color: #f1c40f;">ACTIVE QUEST:</strong>
            <div id="quest-text">Listen to the Mayor</div>
        </div>
        <div class="quest-box">
            <strong style="color: #2ecc71;">COMMUNITY CENTER:</strong>
            <div id="cc-progress">Bundles: 0/3</div>
        </div>
    </div>

    <div id="dialogue-container">
        <div id="name-tag" style="font-weight:bold; color:#f1c40f; font-size:22px;"></div>
        <div id="message" style="font-size:18px;"></div>
    </div>

    <script>
    const config = {
        type: Phaser.AUTO,
        width: 800, height: 600,
        pixelArt: true,
        physics: { default: 'arcade' },
        scene: { preload, create, update }
    };

    const game = new Phaser.Game(config);
    let player, cursors, bundlesFound = 0, isCutscene = true;
    let questStep = 0; // 0: Intro, 1: Visit CC, 2: Collect

    function preload() {
        this.load.spritesheet('chars', 'https://phaser.io', { frameWidth: 16, frameHeight: 18 });
    }

    function create() {
        // 1. MAP SETUP
        this.add.grid(1000, 1000, 2000, 2000, 40, 40, 0x27ae60).setAlpha(0.2);
        this.physics.world.setBounds(0, 0, 2000, 2000);

        // 2. COMMUNITY CENTER (Building Placeholder)
        const cc = this.add.rectangle(1500, 200, 200, 150, 0x95a5a6).setStrokeStyle(4, 0x7f8c8d);
        this.add.text(1420, 180, "COMMUNITY CENTER", {fontSize: '14px', color: '#fff'});
        
        // Interaction Zone for CC
        this.ccZone = this.add.zone(1500, 200, 220, 170);
        this.physics.world.enable(this.ccZone);

        // 3. PLAYER
        player = this.physics.add.sprite(400, 300, 'chars').setScale(2.5);
        this.cameras.main.startFollow(player);

        // 4. BUNDLE ITEMS (Collectibles)
        this.bundles = this.physics.add.staticGroup();
        this.bundles.create(200, 1500, 'chars').setTint(0xff0000).setName('Spring Bundle');
        this.bundles.create(1800, 1800, 'chars').setTint(0x00ff00).setName('Summer Bundle');
        this.bundles.create(100, 100, 'chars').setTint(0x0000ff).setName('Winter Bundle');

        // 5. QUEST LOGIC: COLLISION
        this.physics.add.overlap(player, this.bundles, (p, b) => {
            if (questStep >= 1) {
                b.destroy();
                bundlesFound++;
                updateUI();
                if(bundlesFound === 3) showDialogue("System", ["All bundles collected! Return to the Community Center!"]);
            }
        });

        this.physics.add.overlap(player, this.ccZone, () => {
            if (questStep === 1) {
                questStep = 2;
                showDialogue("Junimo", ["Find the 3 lost bundles hidden across the valley to fix this place!"]);
                updateUI();
            } else if (questStep === 2 && bundlesFound === 3) {
                questStep = 3;
                cc.setFillStyle(0xf1c40f); // Building "Repaired"
                showDialogue("Mayor", ["Unbelievable! You fixed the Community Center! You're a hero!"]);
                updateUI();
            }
        });

        // 6. INTRO
        runIntro(this);
        cursors = this.input.keyboard.createCursorKeys();
    }

    async function runIntro(scene) {
        scene.cameras.main.pan(1500, 200, 2000); // Pan to CC
        showDialogue("Mayor", ["Look at this old Community Center... it's a mess.", "Go check it out, will you?"]);
        await new Promise(r => setTimeout(r, 4000));
        scene.cameras.main.pan(400, 300, 1000);
        hideDialogue();
        isCutscene = false;
        questStep = 1;
        updateUI();
    }

    function showDialogue(name, lines) {
        const container = document.getElementById('dialogue-container');
        container.style.display = 'block';
        document.getElementById('name-tag').innerText = name;
        document.getElementById('message').innerText = lines[0];
        // Auto-hide after 4s
        setTimeout(hideDialogue, 4000);
    }

    function hideDialogue() { document.getElementById('dialogue-container').style.display = 'none'; }

    function updateUI() {
        const qText = document.getElementById('quest-text');
        if (questStep === 1) qText.innerText = "Visit the Community Center (Top Right)";
        if (questStep === 2) qText.innerText = "Collect 3 Hidden Bundles";
        if (questStep === 3) qText.innerText = "Quest Complete!";
        document.getElementById('cc-progress').innerText = `Bundles: ${bundlesFound}/3`;
    }

    function update() {
        if (isCutscene) return;
        player.setVelocity(0);
        if (cursors.left.isDown) player.setVelocityX(-200);
        else if (cursors.right.isDown) player.setVelocityX(200);
        if (cursors.up.isDown) player.setVelocityY(-200);
        else if (cursors.down.isDown) player.setVelocityY(200);
    }
    </script>
</body>
</html>
